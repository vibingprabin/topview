name: topview
description: "A portfolio tracker for stock transactions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^12.0.1
  sqflite: ^2.3.0
  google_fonts: ^6.1.0
  adaptive_theme: ^3.4.1
  path: ^1.8.3
  http: ^1.2.1
  html: ^0.15.4
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^17.0.0
  home_widget: ^0.9.0
  mesh_gradient: ^1.3.8
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
