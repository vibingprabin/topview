name: topview
description: "A portfolio tracker for stock transactions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^10.2.0
  google_fonts: ^6.1.0
  adaptive_theme: ^3.4.1
  path: ^1.8.3
  # Supabase for future implementation
  supabase_flutter: ^2.3.4
  # UI and animations
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
